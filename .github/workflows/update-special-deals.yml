name: Update Special Deals

on:
  workflow_dispatch:
  schedule:
    # 11:35 KST every day (backup/rescue run after primary host automation)
    - cron: "35 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-special-deals
  cancel-in-progress: false

jobs:
  crawl-and-commit:
    runs-on: ubuntu-latest
    env:
      VERCEL_SNAPSHOT_URL: ${{ vars.VERCEL_SNAPSHOT_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether rescue crawl is needed
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          SNAPSHOT_URL="$VERCEL_SNAPSHOT_URL"
          if [ -z "$SNAPSHOT_URL" ]; then
            SNAPSHOT_URL="https://todaysdeal.vercel.app/api/snapshot"
          fi

          echo "TODAY=$TODAY" >> "$GITHUB_ENV"
          echo "SNAPSHOT_URL=$SNAPSHOT_URL" >> "$GITHUB_ENV"

          if curl -fsSL "$SNAPSHOT_URL" -o /tmp/deployed_snapshot.json; then
            SNAPSHOT_DATE=$(python - <<'PY'
import json
from pathlib import Path
payload = json.loads(Path('/tmp/deployed_snapshot.json').read_text(encoding='utf-8'))
print(payload.get('snapshot_date', ''))
PY
)
            echo "Deployed snapshot_date: $SNAPSHOT_DATE"
            if [ "$SNAPSHOT_DATE" = "$TODAY" ]; then
              echo "NEEDS_CRAWL=0" >> "$GITHUB_ENV"
              exit 0
            fi
          else
            echo "Could not fetch deployed snapshot. Proceeding with rescue crawl."
          fi

          echo "NEEDS_CRAWL=1" >> "$GITHUB_ENV"

      - name: Rescue crawl latest snapshot
        if: env.NEEDS_CRAWL == '1'
        run: |
          ATTEMPTS=2
          SLEEP_SECONDS=60
          attempt=1
          while [ "$attempt" -le "$ATTEMPTS" ]; do
            echo "Rescue crawl attempt $attempt/$ATTEMPTS"
            if python scripts/naver_special_deals.py --output-dir data --skip-history; then
              if python scripts/check_snapshot.py --snapshot-file data/latest.json --expect-date "$TODAY" --min-product-count 1; then
                break
              fi
            fi

            if [ "$attempt" -ge "$ATTEMPTS" ]; then
              echo "Rescue crawl failed after $ATTEMPTS attempts."
              exit 1
            fi

            echo "Sleeping ${SLEEP_SECONDS}s before retry"
            sleep "$SLEEP_SECONDS"
            attempt=$((attempt + 1))
          done

      - name: Build derived analytics JSON
        if: env.NEEDS_CRAWL == '1'
        run: |
          python scripts/build_derived_data.py --data-dir data

      - name: Commit updated JSON
        if: env.NEEDS_CRAWL == '1'
        run: |
          if [ -z "$(git status --porcelain -- data)" ]; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update special deals snapshot"
          git push
