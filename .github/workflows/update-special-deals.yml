name: Update Special Deals

on:
  workflow_dispatch:
  schedule:
    # 11:15 KST every day
    - cron: "15 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-special-deals
  cancel-in-progress: false

jobs:
  crawl-and-commit:
    runs-on: ubuntu-latest
    env:
      VERCEL_LIVE_SNAPSHOT_URL: ${{ vars.VERCEL_LIVE_SNAPSHOT_URL }}
      VERCEL_SNAPSHOT_URL: ${{ vars.VERCEL_SNAPSHOT_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live snapshot from Vercel
        run: |
          LIVE_URL="$VERCEL_LIVE_SNAPSHOT_URL"
          if [ -z "$LIVE_URL" ] && [ -n "$VERCEL_SNAPSHOT_URL" ]; then
            case "$VERCEL_SNAPSHOT_URL" in
              */api/snapshot)
                LIVE_URL="${VERCEL_SNAPSHOT_URL%/api/snapshot}/api/live-snapshot"
                ;;
              *)
                LIVE_URL="$VERCEL_SNAPSHOT_URL"
                ;;
            esac
          fi

          if [ -z "$LIVE_URL" ]; then
            echo "No Vercel snapshot URL configured. Falling back to direct crawl."
            exit 0
          fi

          if ! curl -fsSL "$LIVE_URL" -o /tmp/naver_special_deals_snapshot.json; then
            echo "Live snapshot fetch failed. Falling back to direct crawl."
            rm -f /tmp/naver_special_deals_snapshot.json
          fi

      - name: Write JSON files
        run: |
          if [ -f /tmp/naver_special_deals_snapshot.json ]; then
            python scripts/naver_special_deals.py \
              --snapshot-file /tmp/naver_special_deals_snapshot.json \
              --output-dir data \
              --skip-history
          else
            python scripts/naver_special_deals.py \
              --output-dir data \
              --skip-history
          fi

      - name: Build derived analytics JSON
        run: |
          python scripts/build_derived_data.py --data-dir data

      - name: Commit updated JSON
        run: |
          if [ -z "$(git status --porcelain -- data)" ]; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update special deals snapshot"
          git push
