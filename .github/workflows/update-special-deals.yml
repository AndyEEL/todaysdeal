name: Update Special Deals

on:
  workflow_dispatch:
  schedule:
    # 11:06 KST every day
    - cron: "6 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-special-deals
  cancel-in-progress: false

jobs:
  crawl-and-commit:
    runs-on: ubuntu-latest
    env:
      VERCEL_SNAPSHOT_URL: ${{ vars.VERCEL_SNAPSHOT_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch snapshot from Vercel
        run: |
          if [ -z "$VERCEL_SNAPSHOT_URL" ]; then
            echo "Repository variable VERCEL_SNAPSHOT_URL is not set."
            exit 1
          fi

          curl -fsSL "$VERCEL_SNAPSHOT_URL" -o /tmp/naver_special_deals_snapshot.json

      - name: Write JSON files
        run: |
          python scripts/naver_special_deals.py \
            --snapshot-file /tmp/naver_special_deals_snapshot.json \
            --output-dir data/naver_special_deals \
            --skip-history

      - name: Commit updated JSON
        run: |
          if [ -z "$(git status --porcelain -- data/naver_special_deals)" ]; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/naver_special_deals
          git commit -m "Update special deals snapshot"
          git push
